<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>FMLG Case Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;background:#f9fafb;font-family:'Inter','Segoe UI',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px;}
input,button{-webkit-tap-highlight-color:transparent;font-family:inherit;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const ANTHROPIC_API_KEY = "";

const CASE = {
  client:"Jane R. Martinez",
  opponent:"Robert D. Martinez",
  caseNo:"FMCE-2024-008812",
  division:"44",
  court:"Broward County Circuit Court",
  matterType:"Post Decree",
  matterNo:"2026-0042",
  opened:"Feb 18, 2026",
  retainer:"Flat Fee",
  activeTrack:"TPR / Stepparent Adoption",
  coParty:"Thomas A. Wilson (Stepfather)",
  team:[
    {name:"Leisa Wintz",initials:"LW",role:"Attorney"},
    {name:"Naz Hauser",initials:"NH",role:"Partner"},
    {name:"Karen P.",initials:"KP",role:"Paralegal"},
    {name:"Sara D.",initials:"SD",role:"Paralegal"},
  ],
  nextSteps:[
    {id:1,urgency:"high",label:"File TPR / Adoption Petition",detail:"v3 drafted today — attorney review required. Attach UCCJEA Affidavit + Notice of Related Cases.",action:"Review the TPR petition v3 and tell me if it's ready to file"},
    {id:2,urgency:"high",label:"Confirm DOR Transition Status",detail:"Transition letter sent May 13. Confirm DOR released enforcement before proceeding.",action:"What's the status of the DOR transition and what do we need before moving forward?"},
    {id:3,urgency:"med",label:"Draft Notice of Hearing (TPR)",detail:"Once petition filed, schedule hearing and serve biological father.",action:"Draft a notice of hearing for the TPR/Adoption matter"},
    {id:4,urgency:"med",label:"Confirm Service on Bio Father",detail:"TPR petition requires proper personal service on biological father.",action:"What are the service requirements for the TPR petition?"},
    {id:5,urgency:"low",label:"Review Account Statement",detail:"Statement generated today. Flat fee matter — confirm scope alignment.",action:"Summarize the billing status on this matter"},
  ],
  recentDocs:[
    {name:"Joint TPR / Adoption Petition v3",folder:"TPR CASE",date:"Today 12:48pm",status:"DRAFT",ext:"docx"},
    {name:"UCCJEA Affidavit",folder:"TPR CASE",date:"Today 12:50pm",status:"DRAFT",ext:"docx"},
    {name:"Notice of Related Cases",folder:"TPR CASE",date:"Today 12:50pm",status:"DRAFT",ext:"docx"},
    {name:"DOR Transition Letter",folder:"Correspondence",date:"May 13",status:"SENT",ext:"docx"},
    {name:"Notice of Appearance",folder:"Drafts",date:"Feb 20",status:"DRAFT",ext:"docx"},
    {name:"Joint Stipulation — Sub of Counsel",folder:"Filed Docs",date:"Mar 3",status:"FILED",ext:"pdf"},
    {name:"Account Statement",folder:"Billing",date:"Today",status:"CURRENT",ext:"pdf"},
  ],
};

const SYSTEM_PROMPT = `You are the AI legal operations assistant for Family Matters Law Group, P.A. (FMLG), a Florida family law firm.

ACTIVE MATTER:
Client: Jane R. Martinez (Petitioner/Mother)
Opponent: Robert D. Martinez (Bio Father)
Co-Petitioner: Thomas A. Wilson (Stepfather)
Case No: FMCE-2024-008812 | Division 44 | Broward County Circuit Court
Matter: Post Decree No. 2026-0042 | Flat Fee | Opened Feb 18, 2026
Active Track: TPR (Termination of Parental Rights) / Stepparent Adoption

RECENT ACTIVITY:
- May 21 (Today): Joint TPR/Adoption Petition v3, UCCJEA Affidavit, Notice of Related Cases — all drafted, pending attorney review
- May 13: DOR Transition Letter sent — requesting DOR release child support enforcement
- Mar 3: Joint Stipulation for Sub of Counsel filed
- Feb 20: Notice of Appearance drafted
- Feb 18: Matter opened, flat fee signed

You know Florida family law deeply — TPR procedure §39.806, stepparent adoption, DOR transitions, post-decree practice. Be direct and fast. Always flag that filings require attorney review before submission.`;

const urgencyColor = {high:"#ef4444",med:"#f97316",low:"#9ca3af"};
const urgencyLabel = {high:"Urgent",med:"Soon",low:"When ready"};
const statusStyle = {
  DRAFT:  {bg:"#fefce8",color:"#92400e",border:"#fde68a"},
  SENT:   {bg:"#eff6ff",color:"#1e40af",border:"#bfdbfe"},
  FILED:  {bg:"#f0fdf4",color:"#166534",border:"#bbf7d0"},
  CURRENT:{bg:"#fff7ed",color:"#9a3412",border:"#fed7aa"},
  ACTIVE: {bg:"#fff0f6",color:"#be185d",border:"#fbcfe8"},
};

function Badge({status}){
  const s=statusStyle[status]||{bg:"#f3f4f6",color:"#6b7280",border:"#e5e7eb"};
  return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`,fontSize:10,fontWeight:700,letterSpacing:"0.05em",padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{status}</span>;
}

function ExtIcon({ext}){
  const isDoc=ext==="docx";
  return <div style={{width:34,height:34,borderRadius:8,flexShrink:0,background:isDoc?"#eff6ff":"#fff7ed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:isDoc?"#2563eb":"#ea580c",letterSpacing:"0.03em"}}>{ext.toUpperCase()}</div>;
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function Chat({onBack, seedPrompt}){
  const [messages,setMessages]=useState([{role:"assistant",content:"Case loaded — Martinez Post Decree, FMCE-2024-008812.\n\nTPR / Stepparent Adoption track active. Three docs drafted today, pending review. DOR transition letter out May 13.\n\nWhat are we doing today?"}]);
  const [input,setInput]=useState(seedPrompt||"");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);
  useEffect(()=>{if(seedPrompt)setInput(seedPrompt);},[seedPrompt]);

  const quickPrompts=["Is the TPR petition ready to file?","DOR transition status?","Draft notice of hearing","Next 30 days on this case"];

  async function send(text){
    if(!text.trim()||loading)return;
    const next=[...messages,{role:"user",content:text}];
    setMessages(next);setInput("");setLoading(true);
    try{
      if(!ANTHROPIC_API_KEY){
        await new Promise(r=>setTimeout(r,1200));
        setMessages(p=>[...p,{role:"assistant",content:"Demo mode — API key not configured. In production this would return a full AI response about the Martinez matter based on the loaded case context."}]);
      } else {
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:next.map(m=>({role:m.role,content:m.content}))})});
        const data=await res.json();
        setMessages(p=>[...p,{role:"assistant",content:data.content?.find(b=>b.type==="text")?.text||"No response."}]);
      }
    }catch{setMessages(p=>[...p,{role:"assistant",content:"Connection error. Try again."}]);}
    setLoading(false);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#fff",animation:"fadeIn 0.2s ease"}}>
      <div style={{padding:"13px 16px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#6b7280",lineHeight:1,padding:"0 4px"}}>‹</button>
        <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#FF1F8E,#FF6B00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0}}>AI</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>Case Assistant</div>
          <div style={{fontSize:11,color:"#9ca3af"}}>Martinez · Post Decree</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row",alignItems:"flex-end"}}>
            {m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#FF1F8E,#FF6B00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",flexShrink:0}}>AI</div>}
            <div style={{maxWidth:"80%",background:m.role==="user"?"#f9fafb":"#fff",border:m.role==="user"?"1px solid #e5e7eb":"1px solid #f3f4f6",borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",padding:"10px 13px",fontSize:14,lineHeight:1.65,color:"#111827",whiteSpace:"pre-wrap",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#FF1F8E,#FF6B00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",flexShrink:0}}>AI</div>
            <div style={{display:"flex",gap:5,padding:"12px 16px",background:"#fff",border:"1px solid #f3f4f6",borderRadius:"4px 16px 16px 16px",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#FF1F8E",animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {messages.length<=1&&(
        <div style={{padding:"0 16px 10px",display:"flex",gap:8,overflowX:"auto",flexShrink:0}}>
          {quickPrompts.map((p,i)=>(
            <button key={i} onClick={()=>send(p)} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:20,color:"#374151",fontSize:12.5,padding:"7px 14px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{p}</button>
          ))}
        </div>
      )}

      <div style={{padding:"10px 16px 20px",borderTop:"1px solid #f3f4f6",display:"flex",gap:10,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="What are we doing today?" style={{flex:1,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:22,padding:"11px 18px",fontSize:15,color:"#111827",outline:"none"}}/>
        <button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{width:44,height:44,borderRadius:"50%",border:"none",flexShrink:0,background:input.trim()&&!loading?"linear-gradient(135deg,#FF1F8E,#FF6B00)":"#f3f4f6",color:input.trim()&&!loading?"#fff":"#9ca3af",fontSize:18,cursor:input.trim()&&!loading?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
      </div>
    </div>
  );
}

// ── NEXT STEPS ────────────────────────────────────────────────────────────────
function NextSteps({onChat}){
  return(
    <div style={{overflowY:"auto",padding:"16px",animation:"fadeIn 0.2s ease"}}>
      <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Next Steps</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {CASE.nextSteps.map(s=>(
          <div key={s.id} onClick={()=>onChat(s.action)} style={{background:"#fff",border:"1px solid #f3f4f6",borderRadius:12,padding:"14px 16px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:urgencyColor[s.urgency],flexShrink:0}}/>
                <span style={{fontSize:14,fontWeight:600,color:"#111827"}}>{s.label}</span>
              </div>
              <span style={{fontSize:11,fontWeight:600,color:urgencyColor[s.urgency],background:urgencyColor[s.urgency]+"15",padding:"2px 9px",borderRadius:20,flexShrink:0}}>{urgencyLabel[s.urgency]}</span>
            </div>
            <p style={{fontSize:13,color:"#6b7280",lineHeight:1.55,paddingLeft:16,marginBottom:8}}>{s.detail}</p>
            <div style={{paddingLeft:16}}><span style={{fontSize:12.5,color:"#FF1F8E",fontWeight:600}}>Ask AI →</span></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FILES ─────────────────────────────────────────────────────────────────────
function Files(){
  return(
    <div style={{overflowY:"auto",padding:"16px",animation:"fadeIn 0.2s ease"}}>
      <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Recent Documents</p>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {CASE.recentDocs.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 10px",borderRadius:10,background:"#fff",border:"1px solid #f3f4f6"}}>
            <ExtIcon ext={d.ext}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13.5,fontWeight:500,color:"#111827",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div>
              <div style={{fontSize:11.5,color:"#9ca3af",marginTop:2}}>{d.folder} · {d.date}</div>
            </div>
            <Badge status={d.status}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function Home({onNav, onChat}){
  return(
    <div style={{overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:16,animation:"fadeIn 0.2s ease"}}>

      {/* Case card */}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #f3f4f6",padding:"18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:"#111827",marginBottom:2}}>{CASE.client}</div>
            <div style={{fontSize:13,color:"#9ca3af"}}>v. {CASE.opponent}</div>
          </div>
          <Badge status="ACTIVE"/>
        </div>
        <div style={{height:3,background:"linear-gradient(to right,#FF1F8E,#FF6B00,#C8D400,#00B5B8)",borderRadius:2,marginBottom:14}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {[
            {label:"Case No.",val:CASE.caseNo},
            {label:"Division",val:`Div. ${CASE.division}`},
            {label:"Matter Type",val:CASE.matterType},
            {label:"Retainer",val:CASE.retainer},
            {label:"Opened",val:CASE.opened},
            {label:"Matter No.",val:CASE.matterNo},
          ].map(r=>(
            <div key={r.label}>
              <div style={{fontSize:10.5,color:"#9ca3af",marginBottom:1,textTransform:"uppercase",letterSpacing:"0.05em"}}>{r.label}</div>
              <div style={{fontSize:13,fontWeight:500,color:"#374151"}}>{r.val}</div>
            </div>
          ))}
        </div>
        <div style={{padding:"10px 14px",background:"#fff0f6",borderRadius:8,border:"1px solid #fbcfe8"}}>
          <div style={{fontSize:10.5,color:"#be185d",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2,fontWeight:700}}>Active Track</div>
          <div style={{fontSize:13.5,fontWeight:600,color:"#be185d"}}>🔴 {CASE.activeTrack}</div>
          <div style={{fontSize:12,color:"#9b2563",marginTop:2}}>{CASE.coParty}</div>
        </div>
      </div>

      {/* Chat CTA */}
      <button onClick={()=>onNav("chat")} style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#FF1F8E,#FF6B00)",border:"none",borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>Open Case Chat</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:2}}>AI pre-loaded with this matter</div>
        </div>
        <span style={{fontSize:22,color:"#fff"}}>→</span>
      </button>

      {/* Urgent steps */}
      <div>
        <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Urgent</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {CASE.nextSteps.filter(s=>s.urgency==="high").map(s=>(
            <div key={s.id} onClick={()=>{onChat(s.action);onNav("chat");}} style={{background:"#fff",border:"1px solid #f3f4f6",borderRadius:12,padding:"13px 15px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{s.label}</div>
                <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{s.detail}</div>
              </div>
              <span style={{fontSize:16,color:"#d1d5db"}}>›</span>
            </div>
          ))}
        </div>
      </div>

      {/* Recent docs */}
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase"}}>Recent Docs</p>
          <button onClick={()=>onNav("files")} style={{fontSize:12,color:"#FF1F8E",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>See all</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {CASE.recentDocs.slice(0,3).map((d,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"#fff",borderRadius:10,border:"1px solid #f3f4f6"}}>
              <ExtIcon ext={d.ext}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:"#111827",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>{d.date}</div>
              </div>
              <Badge status={d.status}/>
            </div>
          ))}
        </div>
      </div>

      {/* Team */}
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #f3f4f6",padding:"14px 16px"}}>
        <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Team</p>
        <div style={{display:"flex",gap:12}}>
          {CASE.team.map(t=>(
            <div key={t.initials} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:"#f3f4f6",border:"2px solid #e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#6b7280"}}>{t.initials}</div>
              <div style={{fontSize:10,color:"#9ca3af",textAlign:"center"}}>{t.role}</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [chatSeed,setChatSeed]=useState("");

  function goChat(prompt){setChatSeed(prompt||"");setScreen("chat");}

  const tabs=[
    {key:"home",icon:"⊞",label:"Case"},
    {key:"chat",icon:"💬",label:"Chat"},
    {key:"steps",icon:"✅",label:"Steps"},
    {key:"files",icon:"📁",label:"Files"},
  ];

  return(
    <div style={{fontFamily:"'Inter','Segoe UI',sans-serif",background:"#f9fafb",height:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative"}}>

      {/* TOP BAR */}
      <div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"13px 16px 11px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <a href="https://fmlgpa.github.io/lal-platform-demo/" style={{display:"flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:6,background:"linear-gradient(135deg,#FF1F8E,#FF6B00)",textDecoration:"none",fontSize:12,fontWeight:800,color:"#fff",flexShrink:0}}>F</a>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <a href="https://fmlgpa.github.io/lal-platform-demo/" style={{fontSize:11,color:"#9ca3af",textDecoration:"none",fontWeight:500}}>← Platform</a>
            <span style={{color:"#e5e7eb",fontSize:11}}>·</span>
            <span style={{fontSize:13.5,fontWeight:700,color:"#111827"}}>Martinez · Post Decree</span>
          </div>
          <div style={{fontSize:11,color:"#9ca3af"}}>FMCE-2024-008812 · Div. 44</div>
        </div>
        <Badge status="ACTIVE"/>
      </div>

      {/* COLOR BAR */}
      <div style={{height:3,background:"linear-gradient(to right,#FF1F8E,#FF6B00,#C8D400,#00B5B8)",flexShrink:0}}/>

      {/* SCREEN */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {screen==="home"  && <Home  onNav={setScreen} onChat={goChat}/>}
        {screen==="chat"  && <Chat  onBack={()=>setScreen("home")} seedPrompt={chatSeed}/>}
        {screen==="steps" && (
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{padding:"14px 16px 0",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#6b7280",lineHeight:1,padding:"0 4px"}}>‹</button>
              <p style={{fontSize:16,fontWeight:700,color:"#111827"}}>Next Steps</p>
            </div>
            <div style={{flex:1,overflow:"hidden"}}><NextSteps onChat={a=>{goChat(a);}}/></div>
          </div>
        )}
        {screen==="files" && (
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{padding:"14px 16px 0",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#6b7280",lineHeight:1,padding:"0 4px"}}>‹</button>
              <p style={{fontSize:16,fontWeight:700,color:"#111827"}}>Documents</p>
            </div>
            <div style={{flex:1,overflow:"hidden"}}><Files/></div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{background:"#fff",borderTop:"1px solid #f3f4f6",display:"flex",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,8px)"}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setScreen(t.key)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:screen===t.key?"2px solid #FF1F8E":"2px solid transparent",transition:"all 0.15s"}}>
            <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10.5,fontWeight:screen===t.key?700:400,color:screen===t.key?"#FF1F8E":"#9ca3af",letterSpacing:"0.02em"}}>{t.label}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
